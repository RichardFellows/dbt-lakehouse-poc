name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    # Host-mode runner: no Docker service containers; we use docker compose instead.
    # Prerequisites on host: Python 3.10+, ODBC Driver 18, Docker + Docker Compose.

    env:
      SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SERVER: localhost
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: lakehouse_source
      MSSQL_USER: SA
      MSSQL_PASSWORD: ${{ secrets.SA_PASSWORD }}
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      MSSQL_TRUST_CERT: "1"
      NESSIE_URL: http://localhost:19120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env for Docker Compose and pipeline scripts
        run: |
          cat > .env << 'ENVEOF'
          ACCEPT_EULA=Y
          SA_PASSWORD=${{ secrets.SA_PASSWORD }}
          MSSQL_PID=Developer
          ENVEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Start services (MSSQL + Nessie)
        run: docker compose up -d

      - name: Wait for MSSQL to be healthy
        run: |
          echo "Waiting for MSSQL healthcheck..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' lakehouse-mssql 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "healthy" ]; then
              echo "✓ MSSQL is healthy (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — status: $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "ERROR: MSSQL did not become healthy in time"
          docker logs lakehouse-mssql --tail 30
          exit 1

      - name: Wait for Nessie to be ready
        run: |
          echo "Waiting for Nessie catalog..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:19120/api/v2/config > /dev/null 2>&1; then
              echo "✓ Nessie is ready (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 2s..."
            sleep 2
          done
          echo "ERROR: Nessie did not become ready in time"
          docker logs lakehouse-nessie --tail 30
          exit 1

      - name: Seed MSSQL
        run: make seed

      - name: Create venv and install dependencies
        run: make setup

      - name: Run full CI pipeline (extract → transform → test → iceberg → e2e)
        run: make ci-full

      - name: Stop services
        if: always()
        run: docker compose down
