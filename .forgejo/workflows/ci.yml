name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          MSSQL_PID: Developer
        # No ports: — use hostname 'mssql' on shared network (ports cause silent failure in forgejo-runner)
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P \"$SA_PASSWORD\" -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s

      nessie:
        image: ghcr.io/projectnessie/nessie:latest
        env:
          nessie.version.store.type: IN_MEMORY
        # No ports: — use hostname 'nessie' on shared network
        options: >-
          --health-cmd "curl -sf http://localhost:19120/api/v2/config"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 20s

    env:
      # Service containers are reachable by hostname on the shared network
      MSSQL_SERVER: mssql
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: lakehouse_source
      MSSQL_USER: SA
      MSSQL_PASSWORD: ${{ secrets.SA_PASSWORD }}
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      MSSQL_TRUST_CERT: "1"
      NESSIE_URL: http://nessie:19120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ODBC Driver 18 for SQL Server
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            | tee /etc/apt/sources.list.d/mssql-release.list
          apt-get update
          ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt

      - name: Seed MSSQL
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S mssql,1433 \
            -U SA \
            -P "$MSSQL_PASSWORD" \
            -No \
            -i scripts/init-db.sql

      - name: Write .env for pipeline scripts
        run: |
          cat > .env << EOF
          ACCEPT_EULA=Y
          SA_PASSWORD=${{ secrets.SA_PASSWORD }}
          MSSQL_PID=Developer
          MSSQL_SERVER=mssql
          MSSQL_PORT=1433
          MSSQL_DATABASE=lakehouse_source
          MSSQL_USER=SA
          MSSQL_PASSWORD=${{ secrets.SA_PASSWORD }}
          MSSQL_DRIVER=ODBC Driver 18 for SQL Server
          MSSQL_TRUST_CERT=1
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run full CI pipeline (extract → transform → test → iceberg → e2e)
        env:
          NESSIE_URL: http://nessie:19120
        run: make ci-full
