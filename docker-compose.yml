services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lakehouse-mssql
    env_file: .env
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./scripts:/scripts:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U SA -P "$$SA_PASSWORD" \
            -Q "SELECT 1" -No \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  mssql_data:
