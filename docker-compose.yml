services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lakehouse-mssql
    env_file: .env
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./scripts:/scripts:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U SA -P "$$SA_PASSWORD" \
            -Q "SELECT 1" -No \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  localstack:
    image: localstack/localstack:4.6.0
    container_name: lakehouse-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: lakehouse-nessie
    ports:
      - "19120:19120"
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - nessie.version.store.type=ROCKSDB
      - nessie.version.store.persist.rocks.database-path=/data/nessie
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://lakehouse/
      - nessie.catalog.service.s3.default-options.region=us-east-1
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.endpoint=http://localstack:4566/
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.secrets.access-key.name=test
      - nessie.catalog.secrets.access-key.secret=test
      - nessie.server.authentication.enabled=false
    volumes:
      - nessie_data:/data/nessie
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf http://localhost:19120/api/v2/config \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mssql_data:
  localstack_data:
  nessie_data:
