services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lakehouse-mssql
    env_file: .env
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./scripts:/scripts:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U SA -P "$$SA_PASSWORD" \
            -Q "SELECT 1" -No \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    container_name: lakehouse-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: lakehouse-nessie
    ports:
      - "19120:19120"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - nessie.version.store.type=IN_MEMORY
      - nessie.catalog.default-warehouse=warehouse
      - nessie.catalog.warehouses.warehouse.location=s3://lakehouse/
      - nessie.catalog.service.s3.default-options.region=us-east-1
      - nessie.catalog.service.s3.default-options.path-style-access=true
      - nessie.catalog.service.s3.default-options.endpoint=http://minio:9000/
      - nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - nessie.catalog.secrets.access-key.name=minioadmin
      - nessie.catalog.secrets.access-key.secret=minioadmin
      - nessie.server.authentication.enabled=false
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf http://localhost:19120/api/v2/config \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mssql_data:
  minio_data:
