services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lakehouse-mssql
    env_file: .env
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./scripts:/scripts:ro
    healthcheck:
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U SA -P "$$SA_PASSWORD" \
            -Q "SELECT 1" -No \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: lakehouse-nessie
    ports:
      - "19120:19120"
    environment:
      # In-memory store — no external database needed for local dev
      - nessie.version.store.type=IN_MEMORY
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf http://localhost:19120/api/v2/config \
            && echo "OK"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mssql_data:
