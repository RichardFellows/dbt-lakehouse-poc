name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P \"$SA_PASSWORD\" -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 30s

    env:
      MSSQL_SERVER: localhost
      MSSQL_PORT: "1433"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      MSSQL_DATABASE: lakehouse_source
      MSSQL_USER: SA
      MSSQL_PASSWORD: ${{ secrets.SA_PASSWORD }}
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      MSSQL_TRUST_CERT: "1"
      NESSIE_URL: http://localhost:19120
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ODBC Driver 18 for SQL Server
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          UBUNTU_VERSION=$(lsb_release -rs)
          curl -fsSL "https://packages.microsoft.com/config/ubuntu/${UBUNTU_VERSION}/prod.list" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Create venv and install dependencies
        run: |
          $HOME/.local/bin/uv venv .venv
          $HOME/.local/bin/uv pip install -e ".[test]"

      - name: Start LocalStack
        run: |
          docker run -d --name localstack \
            -p 4566:4566 \
            -e SERVICES=s3 \
            -e AWS_DEFAULT_REGION=us-east-1 \
            localstack/localstack:4.6.0

          # Wait for LocalStack
          for i in $(seq 1 30); do
            curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1 && break
            sleep 1
          done
          echo "LocalStack ready"

          # Create S3 bucket using curl (no awscli needed)
          curl -sf -X PUT http://localhost:4566/lakehouse > /dev/null
          echo "LocalStack bucket 'lakehouse' created"

      - name: Start Nessie
        run: |
          # Run Nessie as Docker container — avoids JAR/Java issues
          # Use host network so Nessie can reach LocalStack on localhost:4566
          docker run -d --name nessie \
            --network host \
            -e nessie.version.store.type=IN_MEMORY \
            -e nessie.catalog.default-warehouse=warehouse \
            -e nessie.catalog.warehouses.warehouse.location=s3://lakehouse/ \
            -e nessie.catalog.service.s3.default-options.region=us-east-1 \
            -e nessie.catalog.service.s3.default-options.path-style-access=true \
            -e "nessie.catalog.service.s3.default-options.endpoint=http://localhost:4566/" \
            -e "nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key" \
            -e nessie.catalog.secrets.access-key.name=test \
            -e nessie.catalog.secrets.access-key.secret=test \
            -e nessie.server.authentication.enabled=false \
            -e quarkus.management.port=9900 \
            ghcr.io/projectnessie/nessie:latest

          # Wait for Nessie API
          for i in $(seq 1 60); do
            if curl -sf http://localhost:19120/api/v2/config > /dev/null 2>&1; then
              echo "Nessie ready after ~$((i*2))s"
              break
            fi
            if ! docker inspect --format='{{.State.Running}}' nessie 2>/dev/null | grep -q true; then
              echo "ERROR: Nessie container stopped"
              docker logs nessie
              exit 1
            fi
            sleep 2
          done

          if ! curl -sf http://localhost:19120/api/v2/config > /dev/null 2>&1; then
            echo "ERROR: Nessie did not start. Container logs:"
            docker logs nessie
            exit 1
          fi

      - name: Seed MSSQL
        run: |
          /opt/mssql-tools18/bin/sqlcmd \
            -S localhost,1433 \
            -U SA \
            -P "$MSSQL_PASSWORD" \
            -No \
            -i scripts/init-db.sql

      - name: Write .env for pipeline scripts
        run: |
          cat > .env << EOF
          ACCEPT_EULA=Y
          SA_PASSWORD=${{ secrets.SA_PASSWORD }}
          MSSQL_PID=Developer
          MSSQL_SERVER=localhost
          MSSQL_PORT=1433
          MSSQL_DATABASE=lakehouse_source
          MSSQL_USER=SA
          MSSQL_PASSWORD=${{ secrets.SA_PASSWORD }}
          MSSQL_DRIVER=ODBC Driver 18 for SQL Server
          MSSQL_TRUST_CERT=1
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Run full CI pipeline (extract → transform → dbt test → Iceberg → e2e)
        run: make ci-full
