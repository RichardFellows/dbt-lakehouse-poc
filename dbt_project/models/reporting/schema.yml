version: 2

models:
  - name: rpt_revenue_by_country
    description: "Monthly revenue rollup by country — total orders, units sold, revenue, and avg order value per country/month/year."
    columns:
      - name: country
        description: "Customer country"
        tests:
          - not_null
      - name: year
        description: "Order year"
        tests:
          - not_null
      - name: month
        description: "Order month (1–12)"
        tests:
          - not_null
      - name: total_revenue
        description: "Sum of line_total for this country/month"
        tests:
          - not_null

  - name: rpt_revenue_by_category
    description: "Product category performance — revenue, units sold, avg order value, and product count per category."
    columns:
      - name: category
        description: "Product category (primary key)"
        tests:
          - unique
          - not_null
      - name: total_revenue
        description: "Total revenue for this category"
        tests:
          - not_null
      - name: units_sold
        description: "Total units sold in this category"
        tests:
          - not_null

  - name: rpt_customer_summary
    description: "Per-customer lifetime metrics — total orders, spend, avg order value, and first/last order dates."
    columns:
      - name: customer_id
        description: "Customer identifier (primary key)"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Full customer name"
        tests:
          - not_null
      - name: total_spend
        description: "Lifetime total spend"
        tests:
          - not_null
      - name: total_orders
        description: "Lifetime order count"
        tests:
          - not_null

  - name: rpt_product_performance
    description: "Product-level sales performance with current stock remaining."
    columns:
      - name: product_id
        description: "Product identifier (primary key)"
        tests:
          - unique
          - not_null
      - name: product_name
        description: "Product name"
        tests:
          - not_null
      - name: total_revenue
        description: "Total revenue generated by this product"
        tests:
          - not_null
      - name: stock_remaining
        description: "Current stock quantity from products source"
        tests:
          - not_null
