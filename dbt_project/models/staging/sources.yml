version: 2

# NOTE: These sources are defined for documentation/lineage purposes.
# The actual Parquet reading is done via read_parquet() in each staging model
# using the parquet_path var (default: data/parquet, env: DBT_PARQUET_PATH).
# CSV fallback remains available via csv_path var (env: DBT_CSV_PATH).

sources:
  - name: raw_parquet
    description: "Raw Parquet files read directly by DuckDB (primary source)"
    tables:
      - name: customers
        description: "Customer master data (customers.parquet)"
        columns:
          - name: customer_id
            description: "Primary key"
          - name: customer_name
          - name: email
          - name: country
          - name: signup_date

      - name: products
        description: "Product catalogue (products.parquet)"
        columns:
          - name: product_id
            description: "Primary key"
          - name: product_name
          - name: category
          - name: unit_price
          - name: stock_qty

      - name: orders
        description: "Order transactions (orders.parquet)"
        columns:
          - name: order_id
            description: "Primary key"
          - name: customer_id
            description: "FK to customers"
          - name: product_id
            description: "FK to products"
          - name: quantity
          - name: order_date
          - name: status

  - name: raw_csv
    description: "Raw CSV files — fallback source via read_csv_auto()"
    tables:
      - name: customers
        description: "Customer master data (customers.csv)"
        columns:
          - name: customer_id
            description: "Primary key"
          - name: customer_name
          - name: email
          - name: country
          - name: signup_date

      - name: products
        description: "Product catalogue (products.csv)"
        columns:
          - name: product_id
            description: "Primary key"
          - name: product_name
          - name: category
          - name: unit_price
          - name: stock_qty

      - name: orders
        description: "Order transactions (orders.csv)"
        columns:
          - name: order_id
            description: "Primary key"
          - name: customer_id
            description: "FK to customers"
          - name: product_id
            description: "FK to products"
          - name: quantity
          - name: order_date
          - name: status
